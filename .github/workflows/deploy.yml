name: Deploy Full Stack (Free Architecture)

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          # The Hugging Face Space expects the Dockerfile at the root.
          # We copy the backend folder contents to a temporary directory and push that as the root.
          mkdir -p /tmp/hf-space
          cp -r backend/* /tmp/hf-space/
          cd /tmp/hf-space
          rm -f *.db
          
          # Hugging Face Spaces require a README.md with YAML configuration
          cat << 'EOF' > README.md
---
title: Aura Finance Backend
emoji: 📈
colorFrom: blue
colorTo: green
sdk: docker
pinned: false
app_port: 5000
---
EOF
          
          git init
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Automated deployment from GitHub Actions"
          git branch -M main
          
          # Force push to the Hugging Face Space main branch
          git push -f https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME main
