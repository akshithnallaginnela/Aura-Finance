name: Deploy Aura Finance

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install backend dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Build frontend
      run: |
        npm ci || npm install
        npm run build
        
    - name: Build and Test Docker Compose
      run: |
        docker-compose build
        # Add automated integration tests here later

    # Deployment step would go here depending on the cloud provider
    # e.g., deploy to AWS ECS, Heroku, or push image to Docker Hub
