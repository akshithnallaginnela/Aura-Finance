version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - VITE_GEMINI_API_KEYS=${VITE_GEMINI_API_KEYS}
    volumes:
      - ./backend/aura.db:/app/aura.db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
